$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Library of Longing Scene Schema"
type: object
additionalProperties: false
required:
  - scene
  - visual
  - audio
  - video
  - metadata
properties:
  scene:
    type: object
    additionalProperties: false
    required: [id, slug]
    properties:
      id:
        type: string
        minLength: 1
      slug:
        type: string
        minLength: 1
  visual:
    type: object
    additionalProperties: false
    required:
      - prompt
      - negative_prompt
      - style
      - resolution
      - loop_duration_sec
      - motion_prompt
    properties:
      prompt:
        type: string
        minLength: 1
      negative_prompt:
        type: string
      style:
        type: string
        enum: [ghibli, watercolor, oil]
      resolution:
        type: array
        minItems: 2
        maxItems: 2
        prefixItems:
          - type: integer
            minimum: 256
          - type: integer
            minimum: 256
      loop_duration_sec:
        type: integer
        minimum: 1
      motion_prompt:
        type: string
        minLength: 1
  audio:
    type: object
    additionalProperties: false
    required: [layers]
    properties:
      layers:
        type: object
        additionalProperties: false
        required: [room_tone, continuous, periodic, rare_events]
        properties:
          room_tone:
            $ref: "#/$defs/singleLayer"
          continuous:
            $ref: "#/$defs/singleLayer"
          periodic:
            $ref: "#/$defs/eventLayer"
          rare_events:
            $ref: "#/$defs/eventLayer"
  video:
    type: object
    additionalProperties: false
    required: [target_duration_hours, film_grain, vignette, time_lapse]
    properties:
      target_duration_hours:
        type: integer
        minimum: 1
      film_grain:
        type: integer
        minimum: 0
        maximum: 100
      vignette:
        type: boolean
      time_lapse:
        type: boolean
      time_lapse_segments:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [source, label]
          properties:
            source:
              $ref: "#/$defs/sourceString"
            label:
              type: string
              minLength: 1
  metadata:
    type: object
    additionalProperties: false
    required: [title, description, tags, storyline, culture, season]
    properties:
      title:
        $ref: "#/$defs/bilingualText"
      description:
        $ref: "#/$defs/bilingualText"
      tags:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      storyline:
        $ref: "#/$defs/bilingualText"
      culture:
        type: string
        minLength: 2
      season:
        type: string
        minLength: 2
$defs:
  sourceString:
    type: string
    minLength: 1
  bilingualText:
    type: object
    additionalProperties: false
    required: [ko, en]
    properties:
      ko:
        type: string
        minLength: 1
      en:
        type: string
        minLength: 1
  singleLayer:
    type: object
    additionalProperties: false
    required: [source, volume]
    properties:
      source:
        $ref: "#/$defs/sourceString"
      volume:
        type: number
        minimum: 0
        maximum: 1
  eventLayer:
    type: object
    additionalProperties: false
    required: [sources, interval, volume]
    properties:
      sources:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/sourceString"
      interval:
        type: array
        minItems: 2
        maxItems: 2
        prefixItems:
          - type: integer
            minimum: 1
          - type: integer
            minimum: 1
      volume:
        type: number
        minimum: 0
        maximum: 1
